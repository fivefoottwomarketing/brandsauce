<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrandSauce | Fivefoottwo Marketing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F0E8;--surface:#FFF;--surface2:#F8F5EF;
  --navy:#1B2A4A;--navy2:#243558;
  --accent:#C85A3A;--accent2:#B34E30;
  --text:#1B2A4A;--muted:#6B7A96;
  --border:rgba(27,42,74,.12);--border2:rgba(27,42,74,.22);
  --green:#3A7D5C;
  --font-display:"Playfair Display",Georgia,serif;
  --font-body:"Inter",system-ui,sans-serif;
  --radius:8px;--radius-lg:14px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;font-size:14px;line-height:1.6}
.app{display:flex;min-height:100vh}
.sidebar{width:230px;min-height:100vh;background:var(--navy);display:flex;flex-direction:column;padding:28px 0;flex-shrink:0;position:sticky;top:0;height:100vh}
.logo{padding:0 22px 24px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:16px}
.logo-top{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;color:#fff;font-style:italic;flex-shrink:0}
.logo-wordmark{font-weight:600;font-size:13px;color:#F5F0E8;letter-spacing:.3px}
.logo-sub{font-size:10px;color:rgba(245,240,232,.4);text-transform:uppercase;letter-spacing:2px;margin-top:5px}
.logo-bar{display:block;width:28px;height:2px;background:var(--accent);margin-top:10px}
.nav-section{padding:0 14px;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,.3);margin:8px 0 4px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 22px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;color:rgba(245,240,232,.5);font-size:13px}
.nav-item:hover{color:#F5F0E8;background:rgba(255,255,255,.06)}
.nav-item.active{color:#F5F0E8;border-left-color:var(--accent);background:rgba(200,90,58,.12);font-weight:500}
.nav-item.done{color:rgba(245,240,232,.7)}
.nav-num{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:rgba(245,240,232,.55);flex-shrink:0}
.nav-item.active .nav-num{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-item.done .nav-num{background:var(--green);color:#fff;border-color:var(--green)}
.sidebar-footer{margin-top:auto;padding:16px 22px;border-top:1px solid rgba(255,255,255,.08)}
.btn-ghost{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(245,240,232,.45);padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-family:var(--font-body);font-size:12px;width:100%;transition:all .15s;text-align:left}
.btn-ghost:hover{color:#F5F0E8;border-color:rgba(255,255,255,.28)}
.main{flex:1;overflow-y:auto;padding:44px 48px;max-width:960px}
.welcome{max-width:600px;margin:48px 0}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:"";display:block;width:20px;height:2px;background:var(--accent)}
.welcome h1{font-family:var(--font-display);font-size:54px;line-height:1.08;color:var(--navy);margin-bottom:20px;letter-spacing:-.5px}
.welcome h1 em{font-style:italic;color:var(--accent)}
.welcome p{color:var(--muted);font-size:15px;line-height:1.8;margin-bottom:36px}
.stats-strip{display:flex;gap:32px;margin-top:36px;padding-top:32px;border-top:1px solid var(--border)}
.stat-num{font-family:var(--font-display);font-size:30px;font-weight:700;color:var(--navy);line-height:1}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px}
.progress-bar{height:3px;background:var(--border);border-radius:99px;margin-bottom:44px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .5s ease}
.ex-header{margin-bottom:32px}
.ex-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:2.5px;color:var(--accent);display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ex-tag::before{content:"";display:block;width:18px;height:2px;background:var(--accent)}
.ex-title{font-family:var(--font-display);font-size:36px;color:var(--navy);margin-bottom:8px;letter-spacing:-.4px}
.ex-desc{color:var(--muted);font-size:14px;max-width:540px;line-height:1.7}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:26px;margin-bottom:18px;box-shadow:0 1px 4px rgba(27,42,74,.04)}
.card-title{font-size:11px;font-weight:600;color:var(--navy);margin-bottom:4px;text-transform:uppercase;letter-spacing:1.5px}
.card-desc{color:var(--muted);font-size:13px;margin-bottom:14px;line-height:1.6}
textarea,input[type="text"]{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--font-body);font-size:14px;padding:12px 14px;border-radius:var(--radius);resize:vertical;transition:border-color .15s,box-shadow .15s;line-height:1.6}
textarea:focus,input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,42,74,.07);background:#fff}
textarea::placeholder,input::placeholder{color:rgba(27,42,74,.28)}
.kw-section{margin-bottom:20px}
.kw-section-title{font-size:11px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.kw-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.kw-chip{padding:6px 14px;border-radius:99px;border:1.5px solid var(--border2);font-size:12px;cursor:pointer;transition:all .15s;color:var(--muted);background:var(--surface);font-weight:400;user-select:none}
.kw-chip:hover{border-color:var(--navy);color:var(--navy)}
.kw-chip.selected{background:var(--navy);border-color:var(--navy);color:#F5F0E8;font-weight:500}
.kw-input-row{display:flex;gap:8px;margin-top:8px}
.kw-input-row input{flex:1;padding:9px 12px;font-size:13px}
.kw-add-btn{background:var(--navy);color:#F5F0E8;border:none;padding:9px 16px;border-radius:var(--radius);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.kw-add-btn:hover{background:var(--navy2)}
.kw-selected-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;min-height:20px}
.kw-selected-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(200,90,58,.1);border:1px solid rgba(200,90,58,.25);color:var(--accent);border-radius:99px;padding:4px 10px;font-size:12px;font-weight:500}
.kw-selected-tag span{cursor:pointer;font-size:14px;line-height:1;opacity:.6}
.kw-selected-tag span:hover{opacity:1}
.ai-recs{background:linear-gradient(135deg,rgba(27,42,74,.04),rgba(200,90,58,.04));border:1px solid rgba(200,90,58,.2);border-left:3px solid var(--accent);border-radius:var(--radius-lg);padding:20px;margin-top:16px}
.ai-recs-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ai-recs-title{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px}
.ai-recs-subtitle{font-size:12px;color:var(--muted);margin-top:2px}
.ai-rec-chips{display:flex;flex-wrap:wrap;gap:8px}
.ai-rec-chip{padding:8px 16px;border-radius:99px;border:1.5px solid rgba(200,90,58,.3);font-size:12px;cursor:pointer;transition:all .15s;color:var(--accent);background:rgba(200,90,58,.06);font-weight:500;display:inline-flex;align-items:center;gap:5px}
.ai-rec-chip:hover{background:rgba(200,90,58,.15);border-color:var(--accent)}
.ai-rec-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.values-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-top:12px}
.value-card{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .15s;user-select:none}
.value-card:hover{border-color:var(--navy);background:#fff;transform:translateY(-1px)}
.value-card.selected{background:rgba(27,42,74,.05);border-color:var(--navy);border-width:2px}
.vc-header{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.vc-title{font-size:13px;font-weight:600;color:var(--navy);line-height:1.3}
.vc-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.value-card.selected .vc-check{background:var(--navy);border-color:var(--navy);color:#fff}
.vc-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:7px}
.vc-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag-pill{font-size:10px;padding:2px 8px;border-radius:99px;background:rgba(200,90,58,.09);color:var(--accent);border:1px solid rgba(200,90,58,.18);font-weight:500}
.traits-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-top:12px}
.trait-card{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .15s;user-select:none}
.trait-card:hover{border-color:var(--navy);background:#fff}
.trait-card.selected{background:rgba(27,42,74,.05);border-color:var(--navy);border-width:2px}
.tc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.tc-name{font-size:13px;font-weight:600;color:var(--navy)}
.tc-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s;flex-shrink:0}
.trait-card.selected .tc-check{background:var(--navy);border-color:var(--navy);color:#fff}
.tc-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:6px}
.tc-archetypes{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.arch-pill{font-size:10px;padding:2px 7px;border-radius:99px;background:rgba(27,42,74,.07);color:var(--navy);border:1px solid rgba(27,42,74,.14);font-weight:500}
.tc-expand{font-size:11px;color:var(--accent);cursor:pointer;font-weight:500}
.tc-expand:hover{text-decoration:underline}
.detail-drawer{background:#fff;border:1px solid var(--border2);border-radius:var(--radius);padding:18px;margin-top:10px;animation:slideDown .18s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dd-title{font-family:var(--font-display);font-size:18px;color:var(--navy);margin-bottom:6px}
.dd-desc{font-size:13px;color:var(--text);line-height:1.7;margin-bottom:12px}
.dd-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dd-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.dd-section-title.dos{color:var(--green)}
.dd-section-title.donts{color:var(--accent)}
.dd-body{font-size:12px;color:var(--muted);line-height:1.65}
.dd-example{background:var(--surface2);border-left:3px solid var(--accent);border-radius:4px;padding:10px 12px;margin-top:12px;font-size:12px;color:var(--text);line-height:1.6;font-style:italic}
.dd-close{float:right;font-size:11px;color:var(--muted);cursor:pointer;margin-top:-2px}
.dd-close:hover{color:var(--text)}
.action-row{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap}
.btn-primary{background:var(--navy);color:#F5F0E8;border:none;padding:13px 28px;border-radius:var(--radius);font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.5px;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{background:var(--navy2);transform:translateY(-1px)}
.btn-ai{background:transparent;border:1.5px solid var(--accent);color:var(--accent);padding:9px 16px;border-radius:var(--radius);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn-ai:hover{background:var(--accent);color:#fff}
.btn-ai:disabled{opacity:.35;cursor:not-allowed}
.btn-next{background:var(--navy);color:#F5F0E8;border:none;padding:9px 20px;border-radius:var(--radius);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;margin-left:auto;letter-spacing:.5px;text-transform:uppercase}
.btn-next:hover{background:var(--navy2)}
.btn-export{background:transparent;border:1.5px solid var(--navy);color:var(--navy);padding:9px 16px;border-radius:var(--radius);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-export:hover{background:var(--navy);color:#F5F0E8}
.ai-box{background:#F8F5EF;border:1px solid rgba(27,42,74,.1);border-left:3px solid var(--accent);border-radius:var(--radius);padding:16px;margin-top:14px;font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap;display:none}
.ai-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.spinner{width:13px;height:13px;border:2px solid rgba(200,90,58,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.tone-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.tone-label{width:110px;font-size:12px;color:var(--muted);flex-shrink:0}
.tone-end{width:110px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
input[type="range"]{flex:1;cursor:pointer;accent-color:var(--navy)}
.arch-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.arch-chip{padding:7px 15px;border-radius:99px;border:1.5px solid var(--border2);font-size:12px;cursor:pointer;transition:all .15s;color:var(--muted);background:var(--surface);font-weight:400}
.arch-chip:hover{border-color:var(--navy);color:var(--navy)}
.arch-chip.selected{background:var(--navy);border-color:var(--navy);color:#F5F0E8;font-weight:500}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.kit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.kit-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.kit-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px;font-weight:500}
.kit-value{font-size:13px;color:var(--text);line-height:1.55}
.value-badge{display:inline-block;margin:2px 5px 2px 0;font-size:11px;padding:3px 10px;border-radius:99px;background:var(--surface2);border:1px solid var(--border2);color:var(--text)}
.success-banner{background:rgba(58,125,92,.08);border:1px solid rgba(58,125,92,.2);border-left:3px solid var(--green);border-radius:var(--radius);padding:12px 16px;color:var(--green);font-size:13px;margin-bottom:20px;display:flex;align-items:center;gap:8px;font-weight:500}
.sel-count{font-size:12px;color:var(--muted);margin-top:8px}
.show-all-link{font-size:12px;color:var(--accent);cursor:pointer;font-weight:500;margin-top:12px;display:inline-block}
.show-all-link:hover{text-decoration:underline}
@media(max-width:768px){.two-col,.kit-grid,.values-grid,.traits-grid,.dd-grid{grid-template-columns:1fr}.sidebar{width:60px}.logo-wordmark,.logo-sub,.logo-bar,.nav-label,.nav-section{display:none}.main{padding:20px}.welcome h1{font-size:38px}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-top"><div class="logo-icon">B</div><div class="logo-wordmark">fivefoottwo</div></div>
      <div class="logo-sub">BrandSauce</div><span class="logo-bar"></span>
    </div>
    <div class="nav-section">Exercises</div>
    <div id="nav"></div>
    <div class="sidebar-footer"><button class="btn-ghost" onclick="startOver()">&#8635; Start over</button></div>
  </div>
  <div class="main" id="main"></div>
</div>
<script>
const EXERCISES=[{id:"brandHouse",label:"Brand House",num:1},{id:"personality",label:"Personality",num:2},{id:"positioning",label:"Positioning",num:3},{id:"messaging",label:"Messaging",num:4}];
const ARCHETYPES=["Hero","Everyman","Ruler","Creator","Caregiver","Magician","Explorer","Jester","Sage","Rebel","Lover","Innocent"];
const PERSONALITY_KEYWORDS=["Bold","Warm","Playful","Serious","Innovative","Trustworthy","Empathetic","Energetic","Calm","Inspiring","Direct","Sophisticated","Approachable","Authoritative","Passionate","Authentic","Friendly","Disruptive"];
const GOAL_KEYWORDS=["Growth","Trust","Community","Leadership","Impact","Creativity","Excellence","Transparency","Inclusivity","Innovation","Integrity","Performance","Productivity","Customer Focus","Sustainability","Collaboration"];
  const NOTION_CORE_VALUES=[{"id":"do_the_right_thing","name":"Do the Right Thing","description":"Our company's core value is to always strive to do the right thing, embodying honesty, leadership, respect, and teamwork.","tags":["Honesty","Leadership","Respect","Teamwork"]},{"id":"be_mission_critical","name":"Be Mission Critical","description":"Be customer-focused, proactive and work as a team to achieve success.","tags":["Customer-Focused","Proactive","Teamwork"]},{"id":"do_what_you_love","name":"Do What You Love","description":"At our company, we believe in doing what we love, and we are passionate about entrepreneurship and leadership.","tags":["Entrepreneurship","Leadership"]},{"id":"focus_on_whats_important","name":"Focus on what's important.","description":"We prioritize inclusivity, honesty, and leadership in all aspects of entrepreneurship.","tags":["Entrepreneurship","Honesty","Inclusivity","Leadership"]},{"id":"be_bold_entrepreneurial","name":"Be Bold & Entrepreneurial","description":"Empower innovation and drive growth through bold and entrepreneurial leadership.","tags":["Entrepreneurship","Leadership"]},{"id":"lead_with_compassion","name":"Lead with compassion","description":"Our company's core value is to lead with ambition and compassion.","tags":["Ambition","Compassion","Leadership"]},{"id":"fiercely_curious","name":"Fiercely curious","description":"Embrace curiosity and innovation.","tags":["Curious","Innovative"]},{"id":"trusted_communicators","name":"Trusted Communicators","description":"We prioritize transparent and open communication, fostering integrity in all interactions.","tags":["Communication","Integrity","Transparency"]},{"id":"meaningful_inclusion","name":"Meaningful Inclusion","description":"We cultivate a culture of inclusivity, driven by compassion and respect for diverse perspectives.","tags":["Compassion","Inclusivity","Respect"]},{"id":"effortless","name":"Effortless","description":"We optimize productivity to elevate our performan let state={
  currentExercise:"welcome",openDetail:null,
  cvKeywords:[],vtKeywords:[],
  cvRecs:[],vtRecs:[],
  cvRecsLoading:false,vtRecsLoading:false,
  showAllCV:false,showAllVT:false,
  brandKit:{vision:"",mission:"",coreValues:[],archetypes:[],voiceTraits:[],toneSliders:{formal:50,serious:50,edgy:50},targetAudience:"",uniqueValue:"",competitors:"",positioning:"",tagline:"",elevator:"",keyMessages:""},
  aiOutputs:{},
  done:{brandHouse:false,personality:false,positioning:false,messaging:false},
};

function loadState(){try{const s=localStorage.getItem("bs_fft_v4");if(s){const p=JSON.parse(s);state={...state,...p,openDetail:null,cvRecsLoading:false,vtRecsLoading:false}}}catch(e){}}
function saveState(){try{localStorage.setItem("bs_fft_v4",JSON.stringify(state))}catch(e){}}
function startOver(){if(!confirm("Start over? This clears your saved brand kit."))return;try{localStorage.removeItem("bs_fft_v4")}catch(e){}state={currentExercise:"welcome",openDetail:null,cvKeywords:[],vtKeywords:[],cvRecs:[],vtRecs:[],cvRecsLoading:false,vtRecsLoading:false,showAllCV:false,showAllVT:false,brandKit:{vision:"",mission:"",coreValues:[],archetypes:[],voiceTraits:[],toneSliders:{formal:50,serious:50,edgy:50},targetAudience:"",uniqueValue:"",competitors:"",positioning:"",tagline:"",elevator:"",keyMessages:""},aiOutputs:{},done:{brandHouse:false,personality:false,positioning:false,messaging:false}};render()}
function goTo(id){state.currentExercise=id;state.openDetail=null;state.showAllCV=false;state.showAllVT=false;saveState();render();document.getElementById("main").scrollTop=0}
function progress(){return EXERCISES.filter(e=>state.done[e.id]).length/EXERCISES.length}
function esc(t){return(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function aiBox(id){const out=state.aiOutputs[id];return`<div class="ai-box" id="${id}" style="display:${out?"block":"none"}">${out?'<div class="ai-label">&#10022; AI Suggestion</div>'+esc(out):""}</div>`}
function progressBar(){return`<div class="progress-bar"><div class="progress-fill" style="width:${Math.round(progress()*100)}%"></div></div>`}

async function callClaude(prompt){
  const res=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  return data.content?.find(b=>b.type==="text")?.text||"";
}
function setAiLoading(id){const b=document.getElementById(id);if(!b)return;b.style.display="block";b.innerHTML='<div class="ai-label"><span class="spinner"></span> Generating...</div>'}
function setAiResult(id,text){const b=document.getElementById(id);if(!b)return;b.style.display="block";b.innerHTML='<div class="ai-label">&#10022; AI Suggestion</div>'+esc(text)}

function render(){
  renderNav();
  const views={welcome:renderWelcome,brandHouse:renderBrandHouse,personality:renderPersonality,positioning:renderPositioning,messaging:renderMessaging,summary:renderSummary};
  document.getElementById("main").innerHTML=(views[state.currentExercise]||renderWelcome)();
}

function renderNav(){
  document.getElementById("nav").innerHTML=
    EXERCISES.map(e=>`<div class="nav-item ${state.currentExercise===e.id?"active":""} ${state.done[e.id]?"done":""}" onclick="goTo('${e.id}')">
      <span class="nav-num">${state.done[e.id]?"&#10003;":e.num}</span><span class="nav-label">${e.label}</span></div>`).join("")+
    `<div class="nav-item ${state.currentExercise==="summary"?"active":""}" onclick="goTo('summary')"><span class="nav-num">&#9733;</span><span class="nav-label">Brand Kit</span></div>`;
}

function renderWelcome(){
  const anyDone=Object.values(state.done).some(Boolean);
  const doneCount=EXERCISES.filter(e=>state.done[e.id]).length;
  return`<div class="welcome">
    <div class="eyebrow">AI-Powered Brand Strategy</div>
    <h1>Build your brand <em>foundation.</em></h1>
    <p>Four guided exercises powered by your proprietary Fivefoottwo databases. Use keywords to get AI-recommended values and voice traits — then customise from the full library.</p>
    <button class="btn-primary" onclick="goTo('brandHouse')">${anyDone?"Continue Building":"Let's do this"} &rarr;</button>
    <div class="stats-strip">
      <div class="stat-item"><div class="stat-num">${NOTION_CORE_VALUES.length}</div><div class="stat-label">Core value options</div></div>
      <div class="stat-item"><div class="stat-num">${NOTION_VOICE_TRAITS.length}</div><div class="stat-label">Voice traits</div></div>
      <div class="stat-item"><div class="stat-num">${doneCount}/4</div><div class="stat-label">Exercises done</div></div>
    </div>
  </div>`;
}

function renderKeywordSelector(type){
  const isCV=type==="cv";
  const keywords=isCV?state.cvKeywords:state.vtKeywords;
  const recs=isCV?state.cvRecs:state.vtRecs;
  const loading=isCV?state.cvRecsLoading:state.vtRecsLoading;
  const presetPersonality=PERSONALITY_KEYWORDS.map(k=>{
    const sel=keywords.includes(k);
    return`<span class="kw-chip ${sel?"selected":""}" onclick="toggleKw('${type}','${k}')">${esc(k)}</span>`;
  }).join("");
  const presetGoals=GOAL_KEYWORDS.map(k=>{
    const sel=keywords.includes(k);
    return`<span class="kw-chip ${sel?"selected":""}" onclick="toggleKw('${type}','${k}')">${esc(k)}</span>`;
  }).join("");
  const selectedTags=keywords.map(k=>`<span class="kw-selected-tag">${esc(k)} <span onclick="removeKw('${type}','${k}')">&times;</span></span>`).join("");
  let recsHtml="";
  if(loading){
    recsHtml=`<div class="ai-recs"><div class="ai-recs-header"><span class="spinner"></span><span class="ai-recs-title" style="margin-left:8px">Finding your best matches...</span></div></div>`;
  }else if(recs.length>0){
    const recChips=recs.map(name=>{
      const item=isCV?NOTION_CORE_VALUES.find(v=>v.name===name):NOTION_VOICE_TRAITS.find(t=>t.name===name);
      if(!item)return"";
      const sel=isCV?state.brandKit.coreValues.includes(item.id):state.brandKit.voiceTraits.includes(item.id);
      return`<span class="ai-rec-chip ${sel?"selected":""}" onclick="${isCV?`toggleValue('${item.id}')`:`toggleVoice('${item.id}')`}">&#10022; ${esc(name)}${sel?" &#10003;":""}</span>`;
    }).join("");
    recsHtml=`<div class="ai-recs">
      <div class="ai-recs-header"><div>
        <div class="ai-recs-title">&#10022; FFT + AI Matches</div>
        <div class="ai-recs-subtitle">Best matches from your database based on keywords — click to select</div>
      </div></div>
      <div class="ai-rec-chips">${recChips}</div>
      <div style="margin-top:12px"><span class="show-all-link" onclick="${isCV?"toggleShowAllCV()":"toggleShowAllVT()"}">
        ${isCV?(state.showAllCV?"&#9650; Hide full list":"&#9660; Browse full database"):( state.showAllVT?"&#9650; Hide full list":"&#9660; Browse full database")}
      </span></div>
    </div>`;
  }
  return`<div class="card">
    <div class="card-title">&#128273; Find by Keywords</div>
    <div class="card-desc">Select presets or type your own — then get FFT + AI matched options from your database.</div>
    <div class="kw-section">
      <div class="kw-section-title">Personality &amp; Feel</div>
      <div class="kw-chips">${presetPersonality}</div>
    </div>
    <div class="kw-section">
      <div class="kw-section-title">Goals &amp; Values</div>
      <div class="kw-chips">${presetGoals}</div>
    </div>
    <div class="kw-section">
      <div class="kw-section-title">Add your own</div>
      <div class="kw-input-row">
        <input type="text" id="kwInput_${type}" placeholder="e.g. sustainable, community-led, results-driven..." onkeydown="if(event.key==='Enter')addKw('${type}')">
        <button class="kw-add-btn" onclick="addKw('${type}')">+ Add</button>
      </div>
    </div>
    ${selectedTags?`<div class="kw-selected-list">${selectedTags}</div>`:""}
    <div class="action-row" style="margin-top:16px">
      <button class="btn-ai" onclick="getAiRecs('${type}')" ${keywords.length===0?"disabled":""}>&#10022; Get FFT + AI Options</button>
      ${keywords.length===0?`<span style="font-size:12px;color:var(--muted)">Select at least one keyword first</span>`:""}
    </div>
    ${recsHtml}
  </div>`;
}

function toggleKw(type,kw){const arr=type==="cv"?state.cvKeywords:state.vtKeywords;const i=arr.indexOf(kw);i===-1?arr.push(kw):arr.splice(i,1);saveState();render()}
function addKw(type){const inp=document.getElementById("kwInput_"+type);if(!inp||!inp.value.trim())return;const kw=inp.value.trim();const arr=type==="cv"?state.cvKeywords:state.vtKeywords;if(!arr.includes(kw))arr.push(kw);saveState();render()}
function removeKw(type,kw){const arr=type==="cv"?state.cvKeywords:state.vtKeywords;const i=arr.indexOf(kw);if(i>-1)arr.splice(i,1);saveState();render()}
function toggleShowAllCV(){state.showAllCV=!state.showAllCV;render()}
function toggleShowAllVT(){state.showAllVT=!state.showAllVT;render()}

async function getAiRecs(type){
  const isCV=type==="cv";
  const keywords=isCV?state.cvKeywords:state.vtKeywords;
  if(!keywords.length)return;
  if(isCV){state.cvRecsLoading=true;state.showAllCV=false;}else{state.vtRecsLoading=true;state.showAllVT=false;}
  render();
  try{
    const names=isCV
      ?NOTION_CORE_VALUES.map(v=>`"${v.name}": ${v.description} [${(v.tags||[]).join(",")}]`).join("\n")
      :NOTION_VOICE_TRAITS.map(t=>`"${t.name}": ${t.description} [${(t.archetypes||[]).join(",")}]`).join("\n");
    const label=isCV?"core values":"brand voice traits";
    const r=await callClaude(`You are a brand strategist. A brand described itself with these keywords: ${keywords.join(", ")}.\n\nFrom the following ${label}, pick the 6 best matches. Return ONLY a JSON array of exact names, nothing else.\nExample format: ["Name1","Name2","Name3","Name4","Name5","Name6"]\n\n${label}:\n${names}`);
    let recs=[];
try{const match=r.match(/\[[\s\S]*?\]/);if(match)recs=JSON.parse(match[0]);console.log("AI response:",r);console.log("Parsed recs:",recs)}catch(e){recs=[];console.log("Parse error:",e)}    if(isCV)state.cvRecs=recs;else state.vtRecs=recs;
  }catch(e){if(isCV)state.cvRecs=[];else state.vtRecs=[]}
  if(isCV)state.cvRecsLoading=false;else state.vtRecsLoading=false;
  saveState();render();
}
  function renderBrandHouse(){
  const bk=state.brandKit;
const showAll=state.showAllCV;const hasRecs=state.cvRecs.length>0;
    const displayCV=!hasRecs?[]:showAll?NOTION_CORE_VALUES:NOTION_CORE_VALUES.filter(v=>state.cvRecs.includes(v.name));
    const valCards=displayCV.map(v=>{
    const sel=bk.coreValues.includes(v.id);
    const tags=(v.tags||[]).map(t=>`<span class="tag-pill">${esc(t)}</span>`).join("");
    return`<div class="value-card ${sel?"selected":""}" onclick="toggleValue('${v.id}')">
      <div class="vc-header"><div class="vc-title">${esc(v.name)}</div><div class="vc-check">${sel?"&#10003;":""}</div></div>
      ${v.description?`<div class="vc-desc">${esc(v.description.substring(0,90))}${v.description.length>90?"&hellip;":""}</div>`:""}
      ${tags?`<div class="vc-tags">${tags}</div>`:""}
    </div>`;
  }).join("");
  const gridLabel=state.cvRecs.length>0&&!state.showAllCV
    ?`Showing ${displayCV.length} matched values`
    :`All ${NOTION_CORE_VALUES.length} core values`;
  return progressBar()+`
  <div class="ex-header">
    <div class="ex-tag">Exercise 01</div>
    <div class="ex-title">Brand House</div>
    <div class="ex-desc">Define your foundation — vision, mission, and core values from your proprietary database.</div>
  </div>
  <div class="card">
    <div class="card-title">Vision Statement</div>
    <div class="card-desc">The future you are working to create.</div>
    <textarea id="vision" rows="3" placeholder="e.g. A world where every early-stage startup has the marketing power of a Fortune 500..." oninput="state.brandKit.vision=this.value;saveState()">${esc(bk.vision)}</textarea>
    <div class="action-row"><button class="btn-ai" onclick="aiVision()">&#10022; Refine with AI</button></div>
    ${aiBox("aiVision")}
  </div>
  <div class="card">
    <div class="card-title">Mission Statement</div>
    <div class="card-desc">Your purpose and how you deliver on it.</div>
    <textarea id="mission" rows="3" placeholder="e.g. We help venture-backed startups build sustainable marketing engines..." oninput="state.brandKit.mission=this.value;saveState()">${esc(bk.mission)}</textarea>
    <div class="action-row"><button class="btn-ai" onclick="aiMission()">&#10022; Refine with AI</button></div>
    ${aiBox("aiMission")}
  </div>
  ${renderKeywordSelector("cv")}
  <div class="card">
    <div class="card-title">Core Values</div>
    <div class="card-desc">${gridLabel}. <span class="sel-count">${bk.coreValues.length} selected</span>
      ${state.cvRecs.length>0?`<span class="show-all-link" style="margin-left:8px" onclick="toggleShowAllCV()">${state.showAllCV?"Show matches only":"Browse all "+NOTION_CORE_VALUES.length}</span>`:""}
    </div>
    <div class="values-grid">${valCards}</div>
    <div class="action-row" style="margin-top:18px"><button class="btn-next" onclick="saveBrandHouse()">Save &amp; Continue &rarr;</button></div>
  </div>`;
}

function toggleValue(id){const a=state.brandKit.coreValues,i=a.indexOf(id);i===-1?(a.length<7&&a.push(id)):a.splice(i,1);saveState();render()}
async function aiVision(){const v=document.getElementById("vision").value;if(!v)return;state.brandKit.vision=v;setAiLoading("aiVision");try{const r=await callClaude(`You are a brand strategist. Refine this vision statement — inspiring, clear, memorable. 1-2 sentences only.\n\nVision: ${v}`);state.aiOutputs.aiVision=r;saveState();setAiResult("aiVision",r)}catch(e){document.getElementById("aiVision").innerHTML="Could not connect to AI."}}
async function aiMission(){const m=document.getElementById("mission").value;if(!m)return;state.brandKit.mission=m;setAiLoading("aiMission");try{const r=await callClaude(`Refine this mission statement — clear, purposeful, action-oriented, 1-2 sentences.\n\nMission: ${m}`);state.aiOutputs.aiMission=r;saveState();setAiResult("aiMission",r)}catch(e){document.getElementById("aiMission").innerHTML="Could not connect."}}
function saveBrandHouse(){state.brandKit.vision=document.getElementById("vision")?.value||state.brandKit.vision;state.brandKit.mission=document.getElementById("mission")?.value||state.brandKit.mission;state.done.brandHouse=!!(state.brandKit.vision&&state.brandKit.coreValues.length>0);saveState();goTo("personality")}

function renderPersonality(){
  const bk=state.brandKit;const s=bk.toneSliders;
const showAll=state.showAllCV;const hasRecs=state.cvRecs.length>0;
const displayVT=!hasRecs?[]:showAll?NOTION_VOICE_TRAITS:NOTION_VOICE_TRAITS.filter(t=>state.vtRecs.includes(t.name));
  const traitCards=displayVT.map(t=>{
    const sel=bk.voiceTraits.includes(t.id);
    const open=state.openDetail===t.id;
    const pills=(t.archetypes||[]).map(a=>`<span class="arch-pill">${esc(a)}</span>`).join("");
    const drawer=open?`<div class="detail-drawer" onclick="event.stopPropagation()">
      <span class="dd-close" onclick="toggleDetail('${t.id}')">&#10005; close</span>
      <div class="dd-title">${esc(t.name)}</div>
      <div class="dd-desc">${esc(t.description)}</div>
      <div class="dd-grid">
        <div><div class="dd-section-title dos">&#10003; Do's</div><div class="dd-body">${esc(t.dos)}</div></div>
        <div><div class="dd-section-title donts">&#10005; Don'ts</div><div class="dd-body">${esc(t.donts)}</div></div>
      </div>
      ${t.example?`<div class="dd-example">"${esc(t.example)}"</div>`:""}
    </div>`:"";
    return`<div class="trait-card ${sel?"selected":""}" onclick="toggleVoice('${t.id}')">
      <div class="tc-header"><div class="tc-name">${esc(t.name)}</div><div class="tc-check">${sel?"&#10003;":""}</div></div>
      <div class="tc-desc">${esc((t.description||"").substring(0,80))}${(t.description||"").length>80?"&hellip;":""}</div>
      ${pills?`<div class="tc-archetypes">${pills}</div>`:""}
      ${(t.dos||t.donts)?`<span class="tc-expand" onclick="event.stopPropagation();toggleDetail('${t.id}')">${open?"&#9650; hide":"&#9660; dos & don'ts"}</span>`:""}
      ${drawer}
    </div>`;
  }).join("");
  const archChips=ARCHETYPES.map(a=>{const sel=bk.archetypes.includes(a);return`<span class="arch-chip ${sel?"selected":""}" onclick="toggleArch('${a}')">${a}</span>`}).join("");
  const gridLabel=state.vtRecs.length>0&&!state.showAllVT
    ?`Showing ${displayVT.length} matched traits`
    :`All ${NOTION_VOICE_TRAITS.length} voice traits`;
  return progressBar()+`
  <div class="ex-header">
    <div class="ex-tag">Exercise 02</div>
    <div class="ex-title">Brand Personality</div>
    <div class="ex-desc">Choose voice traits from your Brand Voice Trait Database&#8482; — with dos, don'ts and examples for each.</div>
  </div>
  <div class="card">
    <div class="card-title">Brand Archetypes</div>
    <div class="card-desc">Choose 1-2 primary archetypes.</div>
    <div class="arch-chips">${archChips}</div>
  </div>
  ${renderKeywordSelector("vt")}
  <div class="card">
    <div class="card-title">Voice Traits</div>
    <div class="card-desc">${gridLabel}. Click dos & don'ts for full guidance. <span class="sel-count">${bk.voiceTraits.length} selected</span>
      ${state.vtRecs.length>0?`<span class="show-all-link" style="margin-left:8px" onclick="toggleShowAllVT()">${state.showAllVT?"Show matches only":"Browse all "+NOTION_VOICE_TRAITS.length}</span>`:""}
    </div>
    <div class="traits-grid">${traitCards}</div>
  </div>
  <div class="card">
    <div class="card-title">Tone Spectrum</div>
    <div class="card-desc">Fine-tune your brand's tonal position.</div>
    <div class="tone-row"><div class="tone-label">Casual</div><input type="range" min="0" max="100" value="${s.formal}" oninput="state.brandKit.toneSliders.formal=parseInt(this.value);saveState()"><div class="tone-end">Formal</div></div>
    <div class="tone-row"><div class="tone-label">Playful</div><input type="range" min="0" max="100" value="${s.serious}" oninput="state.brandKit.toneSliders.serious=parseInt(this.value);saveState()"><div class="tone-end">Serious</div></div>
    <div class="tone-row"><div class="tone-label">Conservative</div><input type="range" min="0" max="100" value="${s.edgy}" oninput="state.brandKit.toneSliders.edgy=parseInt(this.value);saveState()"><div class="tone-end">Edgy</div></div>
    <div class="action-row">
      <button class="btn-ai" onclick="aiVoiceGuide()" ${!bk.voiceTraits.length?"disabled":""}>&#10022; Generate Voice Guide</button>
      <button class="btn-next" onclick="savePersonality()">Save &amp; Continue &rarr;</button>
    </div>
    ${aiBox("aiPersonality")}
  </div>`;
}

function toggleDetail(id){state.openDetail=state.openDetail===id?null:id;render()}
function toggleArch(v){const a=state.brandKit.archetypes,i=a.indexOf(v);i===-1?(a.length<2&&a.push(v)):a.splice(i,1);saveState();render()}
function toggleVoice(id){const a=state.brandKit.voiceTraits,i=a.indexOf(id);i===-1?(a.length<6&&a.push(id)):a.splice(i,1);saveState();render()}
async function aiVoiceGuide(){const bk=state.brandKit;const selectedTraits=NOTION_VOICE_TRAITS.filter(t=>bk.voiceTraits.includes(t.id));const ctx=selectedTraits.map(t=>`${t.name}: ${t.description} Do's: ${t.dos} Don'ts: ${t.donts}`).join("\n");setAiLoading("aiPersonality");try{const r=await callClaude(`You are a brand strategist. Based on these voice traits, write a concise voice guide (4-5 bullet points).\n\nTraits:\n${ctx}\n\nTone: Formal/Casual ${bk.toneSliders.formal}/100\nArchetypes: ${bk.archetypes.join(", ")}\n\nBullet points only.`);state.aiOutputs.aiPersonality=r;saveState();setAiResult("aiPersonality",r)}catch(e){document.getElementById("aiPersonality").innerHTML="Could not connect."}}
function savePersonality(){state.done.personality=!!(state.brandKit.archetypes.length&&state.brandKit.voiceTraits.length);saveState();goTo("positioning")}

function renderPositioning(){
  const bk=state.brandKit;
  return progressBar()+`
  <div class="ex-header">
    <div class="ex-tag">Exercise 03</div>
    <div class="ex-title">Brand Positioning</div>
    <div class="ex-desc">Define your market position — who you serve, what makes you different, and how you compare.</div>
  </div>
  <div class="two-col">
    <div class="card"><div class="card-title">Target Audience</div><div class="card-desc">Who is your ideal customer?</div><textarea id="targetAudience" rows="5" placeholder="e.g. Founders of venture-backed B2B SaaS startups..." oninput="state.brandKit.targetAudience=this.value;saveState()">${esc(bk.targetAudience)}</textarea></div>
    <div class="card"><div class="card-title">Unique Value Proposition</div><div class="card-desc">What do you offer that no one else does?</div><textarea id="uniqueValue" rows="5" placeholder="e.g. Big-agency experience from a nimble team..." oninput="state.brandKit.uniqueValue=this.value;saveState()">${esc(bk.uniqueValue)}</textarea></div>
  </div>
  <div class="card"><div class="card-title">Competitive Landscape</div><div class="card-desc">Who are your main competitors and how are you different?</div><textarea id="competitors" rows="3" placeholder="e.g. vs large agencies (we're more agile)..." oninput="state.brandKit.competitors=this.value;saveState()">${esc(bk.competitors)}</textarea></div>
  <div class="card">
    <div class="card-title">Positioning Statement</div>
    <div class="card-desc">Your market position in one powerful sentence.</div>
    <textarea id="positioning" rows="3" placeholder="For [audience] who [need], we are the [category] that [differentiator]..." oninput="state.brandKit.positioning=this.value;saveState()">${esc(bk.positioning)}</textarea>
    <div class="action-row">
      <button class="btn-ai" onclick="aiPositioning()" ${!(bk.targetAudience&&bk.uniqueValue)?"disabled":""}>&#10022; Generate Statement</button>
      <button class="btn-next" onclick="savePositioning()">Save &amp; Continue &rarr;</button>
    </div>
    ${aiBox("aiPositioning")}
  </div>`;
}

async function aiPositioning(){const bk=state.brandKit;const ta=document.getElementById("targetAudience")?.value||bk.targetAudience;const uv=document.getElementById("uniqueValue")?.value||bk.uniqueValue;const comp=document.getElementById("competitors")?.value||bk.competitors;Object.assign(state.brandKit,{targetAudience:ta,uniqueValue:uv,competitors:comp});const cvNames=NOTION_CORE_VALUES.filter(v=>bk.coreValues.includes(v.id)).map(v=>v.name).join(", ");const vtNames=NOTION_VOICE_TRAITS.filter(t=>bk.voiceTraits.includes(t.id)).map(t=>t.name).join(", ");setAiLoading("aiPositioning");try{const r=await callClaude(`Write a positioning statement: "For [audience] who [need], [Brand] is the [category] that [differentiator] because [reason to believe]."\n\nAudience: ${ta}\nValue: ${uv}\nCompetitors: ${comp}\nCore values: ${cvNames}\nVoice: ${vtNames}\n\nReturn only the positioning statement.`);state.aiOutputs.aiPositioning=r;saveState();setAiResult("aiPositioning",r)}catch(e){document.getElementById("aiPositioning").innerHTML="Could not connect."}}
function savePositioning(){Object.assign(state.brandKit,{targetAudience:document.getElementById("targetAudience")?.value||state.brandKit.targetAudience,uniqueValue:document.getElementById("uniqueValue")?.value||state.brandKit.uniqueValue,competitors:document.getElementById("competitors")?.value||state.brandKit.competitors,positioning:document.getElementById("positioning")?.value||state.brandKit.positioning});state.done.positioning=!!(state.brandKit.targetAudience&&state.brandKit.uniqueValue);saveState();goTo("messaging")}

function renderMessaging(){
  const bk=state.brandKit;
  return progressBar()+`
  <div class="ex-header">
    <div class="ex-tag">Exercise 04</div>
    <div class="ex-title">Brand Messaging</div>
    <div class="ex-desc">Craft the words that tell your brand story — consistently, everywhere.</div>
  </div>
  <div class="card">
    <div class="card-title">Brand Tagline</div>
    <div class="card-desc">A short, memorable phrase capturing your brand essence.</div>
    <input type="text" id="tagline" placeholder='e.g. "Grow efficiently. Grow effectively."' value="${esc(bk.tagline)}" oninput="state.brandKit.tagline=this.value;saveState()">
    <div class="action-row"><button class="btn-ai" onclick="aiTagline()">&#10022; Generate 5 Options</button></div>
    ${aiBox("aiTagline")}
  </div>
  <div class="card">
    <div class="card-title">Elevator Pitch</div>
    <div class="card-desc">2-3 sentences for a networking event. Human, clear, no jargon.</div>
    <textarea id="elevator" rows="4" placeholder="e.g. We're a nimble marketing agency built for early-stage startups..." oninput="state.brandKit.elevator=this.value;saveState()">${esc(bk.elevator)}</textarea>
    <div class="action-row"><button class="btn-ai" onclick="aiElevator()">&#10022; Generate Pitch</button></div>
    ${aiBox("aiElevator")}
  </div>
  <div class="card">
    <div class="card-title">Key Messages</div>
    <div class="card-desc">3 core messages grounded in your values and voice.</div>
    <div class="action-row" style="margin-top:0;margin-bottom:10px"><button class="btn-ai" onclick="aiKeyMessages()">&#10022; Generate Key Messages</button></div>
    ${aiBox("aiKeyMessages")}
    <div class="action-row"><button class="btn-next" onclick="saveMessaging()">&#10003; Complete Brand Kit &rarr;</button></div>
  </div>`;
}

async function aiTagline(){const bk=state.brandKit;const vtCtx=NOTION_VOICE_TRAITS.filter(t=>bk.voiceTraits.includes(t.id)).map(t=>`${t.name}: ${t.description}`).join("; ");setAiLoading("aiTagline");try{const r=await callClaude(`Generate 5 tagline options. Each 2-7 words, distinct styles.\n\nVision: ${bk.vision}\nValues: ${NOTION_CORE_VALUES.filter(v=>bk.coreValues.includes(v.id)).map(v=>v.name).join(", ")}\nVoice: ${vtCtx}\nPositioning: ${bk.positioning||bk.uniqueValue}\n\n5 numbered taglines only.`);state.aiOutputs.aiTagline=r;saveState();setAiResult("aiTagline",r)}catch(e){document.getElementById("aiTagline").innerHTML="Could not connect."}}
async function aiElevator(){const bk=state.brandKit;state.brandKit.tagline=document.getElementById("tagline")?.value||bk.tagline;const vtDos=NOTION_VOICE_TRAITS.filter(t=>bk.voiceTraits.includes(t.id)).map(t=>t.dos).join(" ");setAiLoading("aiElevator");try{const r=await callClaude(`Write a 2-3 sentence elevator pitch. Voice guidelines: ${vtDos}\n\nVision: ${bk.vision}\nAudience: ${bk.targetAudience}\nValue: ${bk.uniqueValue}\n\nPitch only.`);state.aiOutputs.aiElevator=r;saveState();setAiResult("aiElevator",r)}catch(e){document.getElementById("aiElevator").innerHTML="Could not connect."}}
async function aiKeyMessages(){const bk=state.brandKit;const cvNames=NOTION_CORE_VALUES.filter(v=>bk.coreValues.includes(v.id)).map(v=>v.name).join("; ");const vtNames=NOTION_VOICE_TRAITS.filter(t=>bk.voiceTraits.includes(t.id)).map(t=>t.name).join(", ");setAiLoading("aiKeyMessages");try{const r=await callClaude(`Generate 3 core brand messages grounded in these values: ${cvNames}. Written in this voice: ${vtNames}.\n\nAudience: ${bk.targetAudience}\nUVP: ${bk.uniqueValue}\n\n3 numbered messages only.`);state.aiOutputs.aiKeyMessages=r;saveState();setAiResult("aiKeyMessages",r)}catch(e){document.getElementById("aiKeyMessages").innerHTML="Could not connect."}}
function saveMessaging(){Object.assign(state.brandKit,{tagline:document.getElementById("tagline")?.value||state.brandKit.tagline,elevator:document.getElementById("elevator")?.value||state.brandKit.elevator});state.done.messaging=!!(state.brandKit.tagline||state.brandKit.elevator);saveState();goTo("summary")}

function renderSummary(){
  const bk=state.brandKit;
  const allDone=Object.values(state.done).every(Boolean);
  const nextId=EXERCISES.find(e=>!state.done[e.id])?.id;
  const cvSelected=NOTION_CORE_VALUES.filter(v=>bk.coreValues.includes(v.id));
  const vtSelected=NOTION_VOICE_TRAITS.filter(t=>bk.voiceTraits.includes(t.id));
  const voiceRows=vtSelected.map(t=>`<div style="margin-bottom:10px"><strong style="font-size:12px;color:var(--navy)">${esc(t.name)}</strong><div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(t.dos)}</div></div>`).join("");
  return`
  <div class="ex-header">
    <div class="ex-tag">Brand Kit</div>
    <div class="ex-title">Your Brand Kit</div>
    <div class="ex-desc">Your complete brand foundation, powered by Fivefoottwo's proprietary databases.</div>
  </div>
  ${allDone?`<div class="success-banner">&#10003; All four exercises complete. Your brand kit is ready.</div>`:""}
  <div class="card"><div class="card-title">Brand House</div><div class="kit-grid">
    <div class="kit-item"><div class="kit-label">Vision</div><div class="kit-value">${esc(bk.vision||"—")}</div></div>
    <div class="kit-item"><div class="kit-label">Mission</div><div class="kit-value">${esc(bk.mission||"—")}</div></div>
    <div class="kit-item" style="grid-column:1/-1"><div class="kit-label">Core Values (${cvSelected.length})</div><div class="kit-value">${cvSelected.length?cvSelected.map(v=>`<span class="value-badge">${esc(v.name)}</span>`).join(""):"—"}</div></div>
  </div></div>
  <div class="card"><div class="card-title">Personality</div><div class="kit-grid">
    <div class="kit-item"><div class="kit-label">Archetypes</div><div class="kit-value">${bk.archetypes.join(", ")||"—"}</div></div>
    <div class="kit-item"><div class="kit-label">Voice Traits</div><div class="kit-value">${vtSelected.map(t=>t.name).join(", ")||"—"}</div></div>
    ${voiceRows?`<div class="kit-item" style="grid-column:1/-1"><div class="kit-label">Voice Guidance</div><div class="kit-value">${voiceRows}</div></div>`:""}
  </div></div>
  <div class="card"><div class="card-title">Positioning</div><div class="kit-grid">
    <div class="kit-item"><div class="kit-label">Target Audience</div><div class="kit-value">${esc(bk.targetAudience||"—")}</div></div>
    <div class="kit-item"><div class="kit-label">Unique Value</div><div class="kit-value">${esc(bk.uniqueValue||"—")}</div></div>
    <div class="kit-item" style="grid-column:1/-1"><div class="kit-label">Positioning Statement</div><div class="kit-value">${esc(bk.positioning||"—")}</div></div>
  </div></div>
  <div class="card"><div class="card-title">Messaging</div><div class="kit-grid">
    <div class="kit-item"><div class="kit-label">Tagline</div><div class="kit-value">${esc(bk.tagline||"—")}</div></div>
    <div class="kit-item" style="grid-column:1/-1"><div class="kit-label">Elevator Pitch</div><div class="kit-value">${esc(bk.elevator||"—")}</div></div>
  </div></div>
  <div class="action-row" style="margin-top:8px">
    <button class="btn-export" onclick="exportKit()">&#8595; Export Brand Kit</button>
    ${!allDone&&nextId?`<button class="btn-next" onclick="goTo('${nextId}')">Continue Building &rarr;</button>`:""}
  </div>`;
}

function exportKit(){
  const bk=state.brandKit;
  const cvSelected=NOTION_CORE_VALUES.filter(v=>bk.coreValues.includes(v.id));
  const vtSelected=NOTION_VOICE_TRAITS.filter(t=>bk.voiceTraits.includes(t.id));
  const voiceGuide=vtSelected.map(t=>`  ${t.name}\n  Do's: ${t.dos}\n  Don'ts: ${t.donts}`).join("\n\n");
  const txt=`FIVEFOOTTWO MARKETING — BRANDSAUCE BRAND KIT\n${"=".repeat(46)}\nGenerated: ${new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}\n\nBRAND HOUSE\nVision: ${bk.vision}\nMission: ${bk.mission}\nCore Values:\n${cvSelected.map(v=>"  • "+v.name).join("\n")}\n\nPERSONALITY\nArchetypes: ${bk.archetypes.join(", ")}\nVoice Traits: ${vtSelected.map(t=>t.name).join(", ")}\n\nVOICE GUIDE\n${voiceGuide}\n\nPOSITIONING\nTarget Audience: ${bk.targetAudience}\nUnique Value: ${bk.uniqueValue}\nPositioning Statement: ${bk.positioning}\n\nMESSAGING\nTagline: ${bk.tagline}\nElevator Pitch: ${bk.elevator}\n`;
  const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([txt],{type:"text/plain"})),download:`fivefoottwo-brand-kit-${new Date().toISOString().slice(0,10)}.txt`});
  a.click();
}

loadState();
render();
</script>
</body>
</html>
