*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F0E8;--surface:#FFF;--surface2:#F8F5EF;
  --navy:#1B2A4A;--navy2:#243558;
  --accent:#C85A3A;--text:#1B2A4A;--muted:#6B7A96;
  --border:rgba(27,42,74,.1);--border2:rgba(27,42,74,.2);
  --green:#3A7D5C;--radius:8px;--radius-lg:14px;
  --font-d:"Playfair Display",Georgia,serif;
  --font-b:"Inter",system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px;line-height:1.6;min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--navy);display:flex;flex-direction:column;padding:24px 0;flex-shrink:0;position:sticky;top:0;height:100vh}
.logo{padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:12px}
.logo-mark{font-family:var(--font-b);font-weight:600;font-size:13px;color:#F5F0E8}
.logo-sub{font-size:10px;color:rgba(245,240,232,.4);text-transform:uppercase;letter-spacing:2px;margin-top:3px}
.logo-line{display:block;width:24px;height:2px;background:var(--accent);margin-top:8px}
.nav-label{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,.3);margin:8px 0 4px 20px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;color:rgba(245,240,232,.5);font-size:13px}
.nav-item:hover{color:#F5F0E8;background:rgba(255,255,255,.05)}
.nav-item.active{color:#F5F0E8;border-left-color:var(--accent);background:rgba(200,90,58,.1);font-weight:500}
.nav-item.done{color:rgba(245,240,232,.65)}
.nav-num{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:rgba(245,240,232,.5);flex-shrink:0}
.nav-item.active .nav-num{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-item.done .nav-num{background:var(--green);color:#fff;border-color:var(--green)}
.sidebar-foot{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
.btn-ghost{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(245,240,232,.4);padding:7px 12px;border-radius:var(--radius);cursor:pointer;font-family:var(--font-b);font-size:12px;width:100%;text-align:left;transition:all .15s}
.btn-ghost:hover{color:#F5F0E8}
.main{flex:1;overflow-y:auto;padding:40px 44px;max-width:900px}
.welcome{max-width:560px;margin:40px 0}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:"";display:block;width:18px;height:2px;background:var(--accent)}
.welcome h1{font-family:var(--font-d);font-size:50px;line-height:1.08;color:var(--navy);margin-bottom:18px;letter-spacing:-.5px}
.welcome h1 em{font-style:italic;color:var(--accent)}
.welcome p{color:var(--muted);font-size:15px;line-height:1.8;margin-bottom:32px}
.progress-bar{height:3px;background:var(--border);border-radius:99px;margin-bottom:40px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .5s ease}
.ex-header{margin-bottom:28px}
.ex-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:2.5px;color:var(--accent);display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ex-tag::before{content:"";display:block;width:16px;height:2px;background:var(--accent)}
.ex-title{font-family:var(--font-d);font-size:34px;color:var(--navy);margin-bottom:6px;letter-spacing:-.3px}
.ex-desc{color:var(--muted);font-size:14px;max-width:500px;line-height:1.7}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:600;color:var(--navy);margin-bottom:4px;text-transform:uppercase;letter-spacing:1.5px}
.card-desc{color:var(--muted);font-size:13px;margin-bottom:12px;line-height:1.6}
textarea,input[type="text"]{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--font-b);font-size:14px;padding:11px 13px;border-radius:var(--radius);resize:vertical;line-height:1.6;transition:border-color .15s}
textarea:focus,input:focus{outline:none;border-color:var(--navy);background:#fff}
textarea::placeholder,input::placeholder{color:rgba(27,42,74,.28)}
.kw-section{margin-bottom:16px}
.kw-title{font-size:11px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:5px 13px;border-radius:99px;border:1.5px solid var(--border2);font-size:12px;cursor:pointer;transition:all .15s;color:var(--muted);background:var(--surface);user-select:none}
.chip:hover{border-color:var(--navy);color:var(--navy)}
.chip.sel{background:var(--navy);border-color:var(--navy);color:#F5F0E8;font-weight:500}
.kw-row{display:flex;gap:8px;margin-top:8px}
.kw-row input{flex:1;padding:8px 12px;font-size:13px}
.kw-add{background:var(--navy);color:#F5F0E8;border:none;padding:8px 14px;border-radius:var(--radius);font-family:var(--font-b);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.kw-add:hover{background:var(--navy2)}
.kw-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.kw-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(200,90,58,.1);border:1px solid rgba(200,90,58,.25);color:var(--accent);border-radius:99px;padding:4px 10px;font-size:12px;font-weight:500}
.kw-tag span{cursor:pointer;opacity:.6;font-size:14px;line-height:1}
.kw-tag span:hover{opacity:1}
.action-row{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap}
.btn-primary{background:var(--navy);color:#F5F0E8;border:none;padding:12px 26px;border-radius:var(--radius);font-family:var(--font-b);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{background:var(--navy2)}
.btn-ai{background:transparent;border:1.5px solid var(--accent);color:var(--accent);padding:8px 16px;border-radius:var(--radius);font-family:var(--font-b);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn-ai:hover{background:var(--accent);color:#fff}
.btn-ai:disabled{opacity:.35;cursor:not-allowed}
.btn-next{background:var(--navy);color:#F5F0E8;border:none;padding:8px 18px;border-radius:var(--radius);font-family:var(--font-b);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;margin-left:auto;text-transform:uppercase;letter-spacing:.5px}
.btn-next:hover{background:var(--navy2)}
.btn-export{background:transparent;border:1.5px solid var(--navy);color:var(--navy);padding:8px 16px;border-radius:var(--radius);font-family:var(--font-b);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-export:hover{background:var(--navy);color:#F5F0E8}
.ai-box{background:#F8F5EF;border:1px solid rgba(27,42,74,.1);border-left:3px solid var(--accent);border-radius:var(--radius);padding:14px;margin-top:12px;font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap;display:none}
.ai-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.spinner{width:13px;height:13px;border:2px solid rgba(200,90,58,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-box{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;text-align:center;color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:12px}
.result-card{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .15s;user-select:none}

.result-card.sel{background:rgba(27,42,74,.05);border-color:var(--navy);border-width:2px}
.rc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.rc-name{font-size:13px;font-weight:600;color:var(--navy);line-height:1.3}
.rc-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.result-card.sel .rc-check{background:var(--navy);border-color:var(--navy);color:#fff}
.rc-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:6px}
.rc-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag-pill{font-size:10px;padding:2px 7px;border-radius:99px;background:rgba(200,90,58,.08);color:var(--accent);border:1px solid rgba(200,90,58,.18);font-weight:500}
.arch-pill{font-size:10px;padding:2px 7px;border-radius:99px;background:rgba(27,42,74,.07);color:var(--navy);border:1px solid rgba(27,42,74,.14);font-weight:500}
.detail-drawer{background:#fff;border:1px solid var(--border2);border-radius:var(--radius);padding:16px;margin-top:8px}
.dd-title{font-family:var(--font-d);font-size:17px;color:var(--navy);margin-bottom:5px}
.dd-desc{font-size:13px;color:var(--text);line-height:1.7;margin-bottom:10px}
.dd-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dd-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.dd-lbl.dos{color:var(--green)}
.dd-lbl.donts{color:var(--accent)}
.dd-body{font-size:12px;color:var(--muted);line-height:1.65}
.dd-eg{background:var(--surface2);border-left:3px solid var(--accent);padding:8px 12px;margin-top:10px;font-size:12px;color:var(--text);font-style:italic}
.dd-close{float:right;font-size:11px;color:var(--muted);cursor:pointer}
.dd-close:hover{color:var(--text)}
.tc-expand{font-size:11px;color:var(--accent);cursor:pointer;font-weight:500;display:inline-block;margin-top:4px}
.arch-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.arch-chip{padding:6px 14px;border-radius:99px;border:1.5px solid var(--border2);font-size:12px;cursor:pointer;transition:all .15s;color:var(--muted);background:var(--surface)}
.arch-chip:hover{border-color:var(--navy);color:var(--navy)}
.arch-chip.sel{background:var(--navy);border-color:var(--navy);color:#F5F0E8;font-weight:500}
.tone-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.tone-lbl{width:100px;font-size:12px;color:var(--muted);flex-shrink:0}
.tone-end{width:100px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
input[type="range"]{flex:1;cursor:pointer;accent-color:var(--navy)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.kit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.kit-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.kit-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:5px;font-weight:500}
.kit-val{font-size:13px;color:var(--text);line-height:1.5}
.v-badge{display:inline-block;margin:2px 4px 2px 0;font-size:11px;padding:3px 9px;border-radius:99px;background:var(--surface2);border:1px solid var(--border2)}
.success-banner{background:rgba(58,125,92,.08);border:1px solid rgba(58,125,92,.2);border-left:3px solid var(--green);border-radius:var(--radius);padding:11px 14px;color:var(--green);font-size:13px;margin-bottom:18px;display:flex;align-items:center;gap:8px;font-weight:500}
.sel-count{font-size:12px;color:var(--muted);font-weight:400}
@media(max-width:700px){.two-col,.kit-grid,.results-grid,.dd-grid{grid-template-columns:1fr}.sidebar{width:56px}.logo-mark,.logo-sub,.logo-line,.nav-label,.nav-txt{display:none}.main{padding:20px}}
</style>
</head>

async function claude(prompt){
  const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]})});
  const d=await r.json();
  return d.content?.find(b=>b.type==="text")?.text||"";
}

    const db=isCV?CV:VT;

      const sel=isCV?S.bk.coreValues.includes(item.id):S.bk.voiceTraits.includes(item.id);

      const tags2=isCV?(item.tags||[]).map(t=>`<span class="tag-pill">${esc(t)}</span>`).join(""):(item.archetypes||[]).map(a=>`<span class="arch-pill">${esc(a)}</span>`).join("");

        <span class="dd-close" onclick="toggleDetail('${item.id}')">&#10005; close</span>
        <div class="dd-title">${esc(item.name)}</div>
        <div class="dd-desc">${esc(item.description)}</div>
        <div class="dd-grid">
          <div><div class="dd-lbl dos">&#10003; Do's</div><div class="dd-body">${esc(item.dos)}</div></div>
          <div><div class="dd-lbl donts">&#10005; Don'ts</div><div class="dd-body">${esc(item.donts)}</div></div>
        </div>
        ${item.example?`<div class="dd-eg">"${esc(item.example)}"</div>`:""}
      </div>`:"";
      return`<div class="result-card ${sel?"sel":""}" onclick="${isCV?`toggleCV('${item.id}')`:`toggleVT('${item.id}')`}">
        <div class="rc-head"><div class="rc-name">${esc(item.name)}</div><div class="rc-check">${sel?"&#10003;":""}</div></div>
        <div class="rc-desc">${esc((item.description||"").substring(0,80))}${(item.description||"").length>80?"&hellip;":""}</div>
        <div class="rc-tags" style="margin-bottom:${!isCV&&(item.dos||item.donts)?"4px":"0"}">${tags2}</div>
        ${!isCV&&(item.dos||item.donts)?`<span class="tc-expand" onclick="event.stopPropagation();toggleDetail('${item.id}')">${open?"&#9650; hide":"&#9660; dos & don'ts"}</span>`:""}
        ${drawer}
      </div>`;
    }).join("");
    resultsHtml=`<div style="margin-top:16px">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:8px"><span style="display:block;width:16px;height:2px;background:var(--accent)"></span>&#10022; FFT + AI Matched Options</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${matches.length} options matched to your keywords — click to select</div>
      <div class="results-grid">${cards}</div>

  }
  return`<div class="card">
    <div class="card-title">Find by Keywords</div>
    <div class="card-desc">Select your brand's personality and goals — then get options matched from the Fivefoottwo database.</div>

function toggleKw(type,kw){const a=type==="cv"?S.cvKw:S.vtKw;const i=a.indexOf(kw);i===-1?a.push(kw):a.splice(i,1);save();render()}
function addKw(type){const el=document.getElementById("kwi_"+type);if(!el||!el.value.trim())return;const kw=el.value.trim();const a=type==="cv"?S.cvKw:S.vtKw;if(!a.includes(kw))a.push(kw);save();render()}
function removeKw(type,kw){const a=type==="cv"?S.cvKw:S.vtKw;const i=a.indexOf(kw);if(i>-1)a.splice(i,1);save();render()}
function toggleDetail(id){S.detail=S.detail===id?null:id;render()}
function toggleCV(id){const a=S.bk.coreValues,i=a.indexOf(id);i===-1?(a.length<7&&a.push(id)):a.splice(i,1);save();render()}
function toggleVT(id){const a=S.bk.voiceTraits,i=a.indexOf(id);i===-1?(a.length<6&&a.push(id)):a.splice(i,1);save();render()}

async function getMatches(type){
  const isCV=type==="cv";
  const kws=isCV?S.cvKw:S.vtKw;
  if(!kws.length)return;
  if(isCV)S.cvLoading=true;else S.vtLoading=true;
  S.detail=null;render();
  try{
    const db=isCV?CV:VT;
    const dbList=db.map(x=>`"${x.name}": ${x.description}${isCV?" ["+(x.tags||[]).join(",")+"]":" ["+(x.archetypes||[]).join(",")+"]"}`).join("\n");
    const label=isCV?"core values":"brand voice traits";
    const r=await claude(`You are a brand strategist. A brand described itself with these keywords: ${kws.join(", ")}.\n\nFrom the list of ${label} below, select the 6-8 best matches. Return ONLY a valid JSON array of exact names — no extra text, no markdown, no explanation.\n\nExample: ["Name One","Name Two","Name Three"]\n\n${label}:\n${dbList}`);
    let matches=[];
    const m=r.match(/\[[\s\S]*?\]/);
    if(m){try{matches=JSON.parse(m[0]);matches=matches.filter(n=>db.some(x=>x.name===n))}catch(e){matches=[]}}
    if(isCV)S.cvMatches=matches;else S.vtMatches=matches;
  }catch(e){if(isCV)S.cvMatches=[];else S.vtMatches=[]}
  if(isCV)S.cvLoading=false;else S.vtLoading=false;
  save();render();
}

      <div class="rc-desc">${esc((t.description||"").substring(0,80))}${(t.description||"").length>80?"&hellip;":""}</div>
    </div>`).join("")}</div>
  </div>`:""}
  <div class="card">
    <div class="card-title">Tone Spectrum</div>
    <div class="card-desc">Fine-tune your brand's tonal position.</div>
    <div class="tone-row"><div class="tone-lbl">Casual</div><input type="range" min="0" max="100" value="${t.formal}" oninput="S.bk.tone.formal=parseInt(this.value);save()"><div class="tone-end">Formal</div></div>
    <div class="tone-row"><div class="tone-lbl">Playful</div><input type="range" min="0" max="100" value="${t.serious}" oninput="S.bk.tone.serious=parseInt(this.value);save()"><div class="tone-end">Serious</div></div>
    <div class="tone-row"><div class="tone-lbl">Conservative</div><input type="range" min="0" max="100" value="${t.edgy}" oninput="S.bk.tone.edgy=parseInt(this.value);save()"><div class="tone-end">Edgy</div></div>
    <div class="action-row">
      <button class="btn-ai" onclick="aiVoice()" ${!bk.voiceTraits.length?"disabled":""}>&#10022; Generate Voice Guide</button>
      <button class="btn-next" onclick="saveP()">Save &amp; Continue &rarr;</button>
    </div>
    ${abox("aiPersonality")}
  </div>`;
}

function toggleArch(v){const a=S.bk.archetypes,i=a.indexOf(v);i===-1?(a.length<2&&a.push(v)):a.splice(i,1);save();render()}
async function aiVoice(){const bk=S.bk;const traits=VT.filter(t=>bk.voiceTraits.includes(t.id));const ctx=traits.map(t=>`${t.name}: ${t.description} Do's: ${t.dos} Don'ts: ${t.donts}`).join("\n");aiLoad("aiPersonality");try{const r=await claude(`Write a concise voice guide (4-5 bullet points) based on these traits.\n\nTraits:\n${ctx}\n\nTone: Formal/Casual ${bk.tone.formal}/100\nArchetypes: ${bk.archetypes.join(", ")}\n\nBullet points only.`);S.ai.aiPersonality=r;save();aiSet("aiPersonality",r)}catch(e){document.getElementById("aiPersonality").innerHTML="Could not connect."}}
function saveP(){S.done.personality=!!(S.bk.archetypes.length&&S.bk.voiceTraits.length);save();go("positioning")}

function rPositioning(){
  const bk=S.bk;
  return pbar()+`
  <div class="ex-header">
    <div class="ex-tag">Exercise 03</div>
    <div class="ex-title">Brand Positioning</div>
    <div class="ex-desc">Define your market position — who you serve, what makes you different.</div>
  </div>
  <div class="two-col">
    <div class="card"><div class="card-title">Target Audience</div><div class="card-desc">Who is your ideal customer?</div><textarea id="ta" rows="5" placeholder="e.g. Founders of venture-backed B2B SaaS startups..." oninput="S.bk.audience=this.value;save()">${esc(bk.audience)}</textarea></div>
    <div class="card"><div class="card-title">Unique Value Proposition</div><div class="card-desc">What do you offer that no one else does?</div><textarea id="uvp" rows="5" placeholder="e.g. Big-agency experience from a nimble team..." oninput="S.bk.uvp=this.value;save()">${esc(bk.uvp)}</textarea></div>
  </div>
  <div class="card"><div class="card-title">Competitive Landscape</div><div class="card-desc">Who are your main competitors and how are you different?</div><textarea id="comp" rows="3" placeholder="e.g. vs large agencies (we're more agile)..." oninput="S.bk.competitors=this.value;save()">${esc(bk.competitors)}</textarea></div>
  <div class="card">
    <div class="card-title">Positioning Statement</div>
    <div class="card-desc">Your market position in one powerful sentence.</div>
    <textarea id="pos" rows="3" placeholder="For [audience] who [need], we are the [category] that [differentiator]..." oninput="S.bk.positioning=this.value;save()">${esc(bk.positioning)}</textarea>
    <div class="action-row">
      <button class="btn-ai" onclick="aiPos()" ${!(bk.audience&&bk.uvp)?"disabled":""}>&#10022; Generate Statement</button>
      <button class="btn-next" onclick="savePo()">Save &amp; Continue &rarr;</button>
    </div>
    ${abox("aiPos")}
  </div>`;
}

async function aiPos(){const bk=S.bk;const ta=document.getElementById("ta")?.value||bk.audience;const uvp=document.getElementById("uvp")?.value||bk.uvp;const comp=document.getElementById("comp")?.value||bk.competitors;Object.assign(S.bk,{audience:ta,uvp:uvp,competitors:comp});const cvn=CV.filter(v=>bk.coreValues.includes(v.id)).map(v=>v.name).join(", ");const vtn=VT.filter(t=>bk.voiceTraits.includes(t.id)).map(t=>t.name).join(", ");aiLoad("aiPos");try{const r=await claude(`Write a positioning statement: "For [audience] who [need], [Brand] is the [category] that [differentiator] because [reason]."\n\nAudience: ${ta}\nUVP: ${uvp}\nCompetitors: ${comp}\nValues: ${cvn}\nVoice: ${vtn}\n\nReturn only the positioning statement.`);S.ai.aiPos=r;save();aiSet("aiPos",r)}catch(e){document.getElementById("aiPos").innerHTML="Could not connect."}}
function savePo(){Object.assign(S.bk,{audience:document.getElementById("ta")?.value||S.bk.audience,uvp:document.getElementById("uvp")?.value||S.bk.uvp,competitors:document.getElementById("comp")?.value||S.bk.competitors,positioning:document.getElementById("pos")?.value||S.bk.positioning});S.done.positioning=!!(S.bk.audience&&S.bk.uvp);save();go("messaging")}

function rMessaging(){
  const bk=S.bk;
  return pbar()+`
  <div class="ex-header">
    <div class="ex-tag">Exercise 04</div>
    <div class="ex-title">Brand Messaging</div>
    <div class="ex-desc">Craft the words that tell your brand story — consistently, everywhere.</div>
  </div>
  <div class="card">
    <div class="card-title">Brand Tagline</div>
    <div class="card-desc">A short, memorable phrase capturing your brand essence.</div>
    <input type="text" id="tag" placeholder='e.g. "Grow efficiently. Grow effectively."' value="${esc(bk.tagline)}" oninput="S.bk.tagline=this.value;save()">
    <div class="action-row"><button class="btn-ai" onclick="aiTag()">&#10022; Generate 5 Options</button></div>
    ${abox("aiTag")}
  </div>
  <div class="card">
    <div class="card-title">Elevator Pitch</div>
    <div class="card-desc">2-3 sentences. Human, clear, no jargon.</div>
    <textarea id="elev" rows="4" placeholder="e.g. We're a nimble marketing agency built for early-stage startups..." oninput="S.bk.elevator=this.value;save()">${esc(bk.elevator)}</textarea>
    <div class="action-row"><button class="btn-ai" onclick="aiElev()">&#10022; Generate Pitch</button></div>
    ${abox("aiElev")}
  </div>
  <div class="card">
    <div class="card-title">Key Messages</div>
    <div class="card-desc">3 core messages grounded in your values and voice.</div>
    <div class="action-row" style="margin-top:0;margin-bottom:10px"><button class="btn-ai" onclick="aiKM()">&#10022; Generate Key Messages</button></div>
    ${abox("aiKM")}
    <div class="action-row"><button class="btn-next" onclick="saveM()">&#10003; Complete Brand Kit &rarr;</button></div>
  </div>`;
}

async function aiTag(){const bk=S.bk;const vtx=VT.filter(t=>bk.voiceTraits.includes(t.id)).map(t=>t.name+": "+t.description).join("; ");aiLoad("aiTag");try{const r=await claude(`Generate 5 tagline options (2-7 words each, distinct styles).\n\nVision: ${bk.vision}\nValues: ${CV.filter(v=>bk.coreValues.includes(v.id)).map(v=>v.name).join(", ")}\nVoice: ${vtx}\nPositioning: ${bk.positioning||bk.uvp}\n\n5 numbered taglines only.`);S.ai.aiTag=r;save();aiSet("aiTag",r)}catch(e){document.getElementById("aiTag").innerHTML="Could not connect."}}
async function aiElev(){const bk=S.bk;S.bk.tagline=document.getElementById("tag")?.value||bk.tagline;const dos=VT.filter(t=>bk.voiceTraits.includes(t.id)).map(t=>t.dos).join(" ");aiLoad("aiElev");try{const r=await claude(`Write a 2-3 sentence elevator pitch.\nVoice guidelines: ${dos}\nVision: ${bk.vision}\nAudience: ${bk.audience}\nUVP: ${bk.uvp}\n\nPitch only.`);S.ai.aiElev=r;save();aiSet("aiElev",r)}catch(e){document.getElementById("aiElev").innerHTML="Could not connect."}}
async function aiKM(){const bk=S.bk;const cvn=CV.filter(v=>bk.coreValues.includes(v.id)).map(v=>v.name).join("; ");const vtn=VT.filter(t=>bk.voiceTraits.includes(t.id)).map(t=>t.name).join(", ");aiLoad("aiKM");try{const r=await claude(`Generate 3 core brand messages grounded in these values: ${cvn}.\nWritten in this voice: ${vtn}.\nAudience: ${bk.audience}\nUVP: ${bk.uvp}\n\n3 numbered messages only.`);S.ai.aiKM=r;save();aiSet("aiKM",r)}catch(e){document.getElementById("aiKM").innerHTML="Could not connect."}}
function saveM(){Object.assign(S.bk,{tagline:document.getElementById("tag")?.value||S.bk.tagline,elevator:document.getElementById("elev")?.value||S.bk.elevator});S.done.messaging=!!(S.bk.tagline||S.bk.elevator);save();go("summary")}

function rSummary(){
  const bk=S.bk;const allDone=Object.values(S.done).every(Boolean);const nextId=EX.find(e=>!S.done[e.id])?.id;
  const cvSel=CV.filter(v=>bk.coreValues.includes(v.id));const vtSel=VT.filter(t=>bk.voiceTraits.includes(t.id));
  const vrows=vtSel.map(t=>`<div style="margin-bottom:8px"><strong style="font-size:12px;color:var(--navy)">${esc(t.name)}</strong><div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(t.dos)}</div></div>`).join("");
  return`
  <div class="ex-header"><div class="ex-tag">Brand Kit</div><div class="ex-title">Your Brand Kit</div><div class="ex-desc">Your complete brand foundation, powered by Fivefoottwo's proprietary databases.</div></div>
  ${allDone?`<div class="success-banner">&#10003; All four exercises complete. Your brand kit is ready.</div>`:""}
  <div class="card"><div class="card-title">Brand House</div><div class="kit-grid">
    <div class="kit-item"><div class="kit-lbl">Vision</div><div class="kit-val">${esc(bk.vision||"—")}</div></div>
    <div class="kit-item"><div class="kit-lbl">Mission</div><div class="kit-val">${esc(bk.mission||"—")}</div></div>
    <div class="kit-item" style="grid-column:1/-1"><div class="kit-lbl">Core Values (${cvSel.length})</div><div class="kit-val">${cvSel.length?cvSel.map(v=>`<span class="v-badge">${esc(v.name)}</span>`).join(""):"—"}</div></div>
  </div></div>
  <div class="card"><div class="card-title">Personality</div><div class="kit-grid">
    <div class="kit-item"><div class="kit-lbl">Archetypes</div><div class="kit-val">${bk.archetypes.join(", ")||"—"}</div></div>
    <div class="kit-item"><div class="kit-lbl">Voice Traits</div><div class="kit-val">${vtSel.map(t=>t.name).join(", ")||"—"}</div></div>
    ${vrows?`<div class="kit-item" style="grid-column:1/-1"><div class="kit-lbl">Voice Guidance</div><div class="kit-val">${vrows}</div></div>`:""}
  </div></div>
  <div class="card"><div class="card-title">Positioning</div><div class="kit-grid">
    <div class="kit-item"><div class="kit-lbl">Target Audience</div><div class="kit-val">${esc(bk.audience||"—")}</div></div>
    <div class="kit-item"><div class="kit-lbl">Unique Value</div><div class="kit-val">${esc(bk.uvp||"—")}</div></div>
    <div class="kit-item" style="grid-column:1/-1"><div class="kit-lbl">Positioning Statement</div><div class="kit-val">${esc(bk.positioning||"—")}</div></div>
  </div></div>
  <div class="card"><div class="card-title">Messaging</div><div class="kit-grid">
    <div class="kit-item"><div class="kit-lbl">Tagline</div><div class="kit-val">${esc(bk.tagline||"—")}</div></div>
    <div class="kit-item" style="grid-column:1/-1"><div class="kit-lbl">Elevator Pitch</div><div class="kit-val">${esc(bk.elevator||"—")}</div></div>
  </div></div>
  <div class="action-row" style="margin-top:8px">
    <button class="btn-export" onclick="exportKit()">&#8595; Export Brand Kit</button>
    ${!allDone&&nextId?`<button class="btn-next" onclick="go('${nextId}')">Continue Building &rarr;</button>`:""}
  </div>`;
}

function exportKit(){
  const bk=S.bk;const cvSel=CV.filter(v=>bk.coreValues.includes(v.id));const vtSel=VT.filter(t=>bk.voiceTraits.includes(t.id));
  const vg=vtSel.map(t=>`  ${t.name}\n  Do's: ${t.dos}\n  Don'ts: ${t.donts}`).join("\n\n");
  const txt=`FIVEFOOTTWO MARKETING — BRANDSAUCE BRAND KIT\n${"=".repeat(46)}\nGenerated: ${new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}\n\nBRAND HOUSE\nVision: ${bk.vision}\nMission: ${bk.mission}\nCore Values:\n${cvSel.map(v=>"  • "+v.name).join("\n")}\n\nPERSONALITY\nArchetypes: ${bk.archetypes.join(", ")}\nVoice Traits: ${vtSel.map(t=>t.name).join(", ")}\n\nVOICE GUIDE\n${vg}\n\nPOSITIONING\nTarget Audience: ${bk.audience}\nUnique Value: ${bk.uvp}\nPositioning Statement: ${bk.positioning}\n\nMESSAGING\nTagline: ${bk.tagline}\nElevator Pitch: ${bk.elevator}\n`;
  const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([txt],{type:"text/plain"})),download:`fivefoottwo-brand-kit-${new Date().toISOString().slice(0,10)}.txt`});a.click();
}

load();render();
</script>
</body>
</html>
