<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrandSauce | Fivefoottwo Marketing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F0E8;--surface:#FFF;--surface2:#F8F5EF;
  --navy:#1B2A4A;--navy2:#243558;
  --accent:#C85A3A;--accent2:#B34E30;
  --text:#1B2A4A;--muted:#6B7A96;
  --border:rgba(27,42,74,.12);--border2:rgba(27,42,74,.22);
  --green:#3A7D5C;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'Inter',system-ui,sans-serif;
  --radius:8px;--radius-lg:14px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;font-size:14px;line-height:1.6}
.app{display:flex;min-height:100vh}

/* ── Sidebar ── */
.sidebar{width:230px;min-height:100vh;background:var(--navy);display:flex;flex-direction:column;padding:28px 0;flex-shrink:0;position:sticky;top:0;height:100vh}
.logo{padding:0 22px 24px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:16px}
.logo-top{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;color:#fff;font-style:italic;flex-shrink:0}
.logo-wordmark{font-weight:600;font-size:13px;color:#F5F0E8;letter-spacing:.3px}
.logo-sub{font-size:10px;color:rgba(245,240,232,.4);text-transform:uppercase;letter-spacing:2px;margin-top:5px}
.logo-bar{display:block;width:28px;height:2px;background:var(--accent);margin-top:10px}
.nav-section{padding:0 14px;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,.3);margin:8px 0 4px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 22px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;color:rgba(245,240,232,.5);font-size:13px}
.nav-item:hover{color:#F5F0E8;background:rgba(255,255,255,.06)}
.nav-item.active{color:#F5F0E8;border-left-color:var(--accent);background:rgba(200,90,58,.12);font-weight:500}
.nav-item.done{color:rgba(245,240,232,.7)}
.nav-num{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:rgba(245,240,232,.55);flex-shrink:0}
.nav-item.active .nav-num{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-item.done .nav-num{background:var(--green);color:#fff;border-color:var(--green)}
.sidebar-footer{margin-top:auto;padding:16px 22px;border-top:1px solid rgba(255,255,255,.08)}
.btn-ghost{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(245,240,232,.45);padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-family:var(--font-body);font-size:12px;width:100%;transition:all .15s;text-align:left}
.btn-ghost:hover{color:#F5F0E8;border-color:rgba(255,255,255,.28)}

/* ── Main ── */
.main{flex:1;overflow-y:auto;padding:44px 48px;max-width:960px}

/* ── Welcome ── */
.welcome{max-width:600px;margin:48px 0}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:'';display:block;width:20px;height:2px;background:var(--accent)}
.welcome h1{font-family:var(--font-display);font-size:54px;line-height:1.08;color:var(--navy);margin-bottom:20px;letter-spacing:-.5px}
.welcome h1 em{font-style:italic;color:var(--accent)}
.welcome p{color:var(--muted);font-size:15px;line-height:1.8;margin-bottom:36px}
.stats-strip{display:flex;gap:32px;margin-top:36px;padding-top:32px;border-top:1px solid var(--border)}
.stat-num{font-family:var(--font-display);font-size:30px;font-weight:700;color:var(--navy);line-height:1}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px}
.stat-loading{font-size:20px;color:var(--border2)}

/* ── Progress bar ── */
.progress-bar{height:3px;background:var(--border);border-radius:99px;margin-bottom:44px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .5s ease}

/* ── Section header ── */
.ex-header{margin-bottom:32px}
.ex-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:2.5px;color:var(--accent);display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ex-tag::before{content:'';display:block;width:18px;height:2px;background:var(--accent)}
.ex-title{font-family:var(--font-display);font-size:36px;color:var(--navy);margin-bottom:8px;letter-spacing:-.4px}
.ex-desc{color:var(--muted);font-size:14px;max-width:540px;line-height:1.7}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:26px;margin-bottom:18px;box-shadow:0 1px 4px rgba(27,42,74,.04)}
.card-title{font-size:11px;font-weight:600;color:var(--navy);margin-bottom:4px;text-transform:uppercase;letter-spacing:1.5px}
.card-desc{color:var(--muted);font-size:13px;margin-bottom:14px;line-height:1.6}

/* ── Forms ── */
textarea,input[type="text"]{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--font-body);font-size:14px;padding:12px 14px;border-radius:var(--radius);resize:vertical;transition:border-color .15s,box-shadow .15s;line-height:1.6}
textarea:focus,input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,42,74,.07);background:#fff}
textarea::placeholder,input::placeholder{color:rgba(27,42,74,.28)}

/* ── Skeleton loader ── */
.skeleton{background:linear-gradient(90deg,var(--border) 25%,rgba(27,42,74,.06) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius);height:14px;margin-bottom:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Core value cards ── */
.values-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-top:12px}
.value-card{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .15s;user-select:none}
.value-card:hover{border-color:var(--navy);background:#fff;transform:translateY(-1px)}
.value-card.selected{background:rgba(27,42,74,.05);border-color:var(--navy);border-width:2px}
.vc-header{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.vc-title{font-size:13px;font-weight:600;color:var(--navy);line-height:1.3}
.vc-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.value-card.selected .vc-check{background:var(--navy);border-color:var(--navy);color:#fff}
.vc-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:7px}
.vc-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag-pill{font-size:10px;padding:2px 8px;border-radius:99px;background:rgba(200,90,58,.09);color:var(--accent);border:1px solid rgba(200,90,58,.18);font-weight:500}

/* ── Voice trait cards ── */
.traits-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-top:12px}
.trait-card{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .15s;user-select:none}
.trait-card:hover{border-color:var(--navy);background:#fff}
.trait-card.selected{background:rgba(27,42,74,.05);border-color:var(--navy);border-width:2px}
.tc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.tc-name{font-size:13px;font-weight:600;color:var(--navy)}
.tc-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s;flex-shrink:0}
.trait-card.selected .tc-check{background:var(--navy);border-color:var(--navy);color:#fff}
.tc-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:6px}
.tc-archetypes{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.arch-pill{font-size:10px;padding:2px 7px;border-radius:99px;background:rgba(27,42,74,.07);color:var(--navy);border:1px solid rgba(27,42,74,.14);font-weight:500}
.tc-expand{font-size:11px;color:var(--accent);cursor:pointer;font-weight:500}
.tc-expand:hover{text-decoration:underline}

/* ── Detail drawer ── */
.detail-drawer{background:#fff;border:1px solid var(--border2);border-radius:var(--radius);padding:18px;margin-top:10px;animation:slideDown .18s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dd-title{font-family:var(--font-display);font-size:18px;color:var(--navy);margin-bottom:6px}
.dd-desc{font-size:13px;color:var(--text);line-height:1.7;margin-bottom:12px}
.dd-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dd-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.dd-section-title.dos{color:var(--green)}
.dd-section-title.donts{color:var(--accent)}
.dd-body{font-size:12px;color:var(--muted);line-height:1.65}
.dd-example{background:var(--surface2);border-left:3px solid var(--accent);border-radius:4px;padding:10px 12px;margin-top:12px;font-size:12px;color:var(--text);line-height:1.6;font-style:italic}
.dd-close{float:right;font-size:11px;color:var(--muted);cursor:pointer;margin-top:-2px}
.dd-close:hover{color:var(--text)}

/* ── Buttons ── */
.action-row{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap}
.btn-primary{background:var(--navy);color:#F5F0E8;border:none;padding:13px 28px;border-radius:var(--radius);font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.5px;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{background:var(--navy2);transform:translateY(-1px)}
.btn-ai{background:transparent;border:1.5px solid var(--accent);color:var(--accent);padding:9px 16px;border-radius:var(--radius);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn-ai:hover{background:var(--accent);color:#fff}
.btn-ai:disabled{opacity:.35;cursor:not-allowed}
.btn-next{background:var(--navy);color:#F5F0E8;border:none;padding:9px 20px;border-radius:var(--radius);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;margin-left:auto;letter-spacing:.5px;text-transform:uppercase}
.btn-next:hover{background:var(--navy2)}
.btn-export{background:transparent;border:1.5px solid var(--navy);color:var(--navy);padding:9px 16px;border-radius:var(--radius);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-export:hover{background:var(--navy);color:#F5F0E8}

/* ── AI output box ── */
.ai-box{background:#F8F5EF;border:1px solid rgba(27,42,74,.1);border-left:3px solid var(--accent);border-radius:var(--radius);padding:16px;margin-top:14px;font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap;display:none}
.ai-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.spinner{width:13px;height:13px;border:2px solid rgba(200,90,58,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Tone sliders ── */
.tone-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.tone-label{width:110px;font-size:12px;color:var(--muted);flex-shrink:0}
.tone-end{width:110px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
input[type="range"]{flex:1;cursor:pointer;accent-color:var(--navy)}

/* ── Archetype chips ── */
.arch-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.arch-chip{padding:7px 15px;border-radius:99px;border:1.5px solid var(--border2);font-size:12px;cursor:pointer;transition:all .15s;color:var(--muted);background:var(--surface);font-weight:400}
.arch-chip:hover{border-color:var(--navy);color:var(--navy)}
.arch-chip.selected{background:var(--navy);border-color:var(--navy);color:#F5F0E8;font-weight:500}

/* ── Two-col layout ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}

/* ── Kit summary ── */
.kit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.kit-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.kit-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px;font-weight:500}
.kit-value{font-size:13px;color:var(--text);line-height:1.55}
.value-badge{display:inline-block;margin:2px 5px 2px 0;font-size:11px;padding:3px 10px;border-radius:99px;background:var(--surface2);border:1px solid var(--border2);color:var(--text)}
.success-banner{background:rgba(58,125,92,.08);border:1px solid rgba(58,125,92,.2);border-left:3px solid var(--green);border-radius:var(--radius);padding:12px 16px;color:var(--green);font-size:13px;margin-bottom:20px;display:flex;align-items:center;gap:8px;font-weight:500}
.sel-count{font-size:12px;color:var(--muted);margin-top:8px}

/* ── Data freshness badge ── */
.data-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--green);background:rgba(58,125,92,.08);border:1px solid rgba(58,125,92,.2);border-radius:99px;padding:3px 10px;margin-left:8px}
.data-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

/* ── Notion refresh button ── */
.refresh-btn{font-size:11px;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-left:8px;font-weight:500}
.refresh-btn:hover{color:var(--accent)}

/* ── Error banner ── */
.error-banner{background:rgba(200,90,58,.08);border:1px solid rgba(200,90,58,.2);border-left:3px solid var(--accent);border-radius:var(--radius);padding:12px 16px;color:var(--accent2);font-size:13px;margin-bottom:16px;line-height:1.6}

@media(max-width:768px){
  .two-col,.kit-grid,.values-grid,.traits-grid,.dd-grid{grid-template-columns:1fr}
  .sidebar{width:60px}
  .logo-wordmark,.logo-sub,.logo-bar,.nav-label,.nav-section{display:none}
  .main{padding:20px}
  .welcome h1{font-size:38px}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-top">
        <div class="logo-icon">B</div>
        <div class="logo-wordmark">fivefoottwo</div>
      </div>
      <div class="logo-sub">BrandSauce</div>
      <span class="logo-bar"></span>
    </div>
    <div class="nav-section">Exercises</div>
    <div id="nav"></div>
    <div class="sidebar-footer">
      <button class="btn-ghost" onclick="startOver()">↺ Start over</button>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────
// In production this calls your /api/notion serverless function.
// For local dev, run: npx vercel dev
const API_BASE = '/api/notion';

const EXERCISES = [
  {id:'brandHouse',label:'Brand House',num:1},
  {id:'personality',label:'Personality',num:2},
  {id:'positioning',label:'Positioning',num:3},
  {id:'messaging',label:'Messaging',num:4},
];

const ARCHETYPES = ['Hero','Everyman','Ruler','Creator','Caregiver','Magician','Explorer','Jester','Sage','Rebel','Lover','Innocent'];

// ─── State ────────────────────────────────────────────────────────────
let db = { coreValues: null, voiceTraits: null, loading: false, error: null, loadedAt: null };

let state = {
  currentExercise: 'welcome',
  openDetail: null,
  brandKit: {
    vision:'', mission:'', coreValues:[],
    archetypes:[], voiceTraits:[], toneSliders:{formal:50,serious:50,edgy:50},
    targetAudience:'', uniqueValue:'', competitors:'', positioning:'',
    tagline:'', elevator:'', keyMessages:'',
  },
  aiOutputs: {},
  done: {brandHouse:false,personality:false,positioning:false,messaging:false},
};

function loadPersistedState() {
  try {
    const s = localStorage.getItem('bs_fft_v2');
    if (s) { const p = JSON.parse(s); state = {...state, ...p, openDetail: null}; }
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('bs_fft_v2', JSON.stringify(state)); } catch(e) {}
}

function startOver() {
  if (!confirm('Start over? This clears your saved brand kit.')) return;
  try { localStorage.removeItem('bs_fft_v2'); } catch(e) {}
  state = {
    currentExercise:'welcome', openDetail:null,
    brandKit:{vision:'',mission:'',coreValues:[],archetypes:[],voiceTraits:[],toneSliders:{formal:50,serious:50,edgy:50},targetAudience:'',uniqueValue:'',competitors:'',positioning:'',tagline:'',elevator:'',keyMessages:''},
    aiOutputs:{}, done:{brandHouse:false,personality:false,positioning:false,messaging:false},
  };
  render();
}

function goTo(id) {
  state.currentExercise = id;
  state.openDetail = null;
  saveState();
  render();
  document.getElementById('main').scrollTop = 0;
}

function progress() {
  return EXERCISES.filter(e => state.done[e.id]).length / EXERCISES.length;
}

// ─── Notion Data Fetching ─────────────────────────────────────────────
async function fetchNotionData(force = false) {
  if (db.loading) return;
  // Use cached data if fresh (< 5 min) and not forced
  if (!force && db.loadedAt && (Date.now() - db.loadedAt) < 300000 && db.coreValues && db.voiceTraits) return;

  db.loading = true;
  db.error = null;
  render();

  try {
    const res = await fetch(`${API_BASE}?type=all`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    const data = await res.json();
    db.coreValues = data.coreValues || [];
    db.voiceTraits = data.voiceTraits || [];
    db.loadedAt = Date.now();
    db.error = null;
  } catch(e) {
    db.error = e.message;
    console.error('Notion fetch error:', e);
  } finally {
    db.loading = false;
    render();
  }
}

// ─── Claude AI calls ──────────────────────────────────────────────────
async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:prompt}]}),
  });
  const data = await res.json();
  return data.content?.find(b => b.type==='text')?.text || '';
}

function setAiLoading(id) {
  const b = document.getElementById(id);
  if (!b) return;
  b.style.display = 'block';
  b.innerHTML = '<div class="ai-label"><span class="spinner"></span> Generating...</div>';
}

function setAiResult(id, text) {
  const b = document.getElementById(id);
  if (!b) return;
  b.style.display = 'block';
  b.innerHTML = '<div class="ai-label">✦ AI Suggestion</div>' + esc(text);
}

// ─── Helpers ──────────────────────────────────────────────────────────
function esc(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function aiBox(id) {
  const out = state.aiOutputs[id];
  return `<div class="ai-box" id="${id}" style="display:${out?'block':'none'}">${out?'<div class="ai-label">✦ AI Suggestion</div>'+esc(out):''}</div>`;
}
function progressBar() {
  return `<div class="progress-bar"><div class="progress-fill" style="width:${Math.round(progress()*100)}%"></div></div>`;
}
function timeAgo(ms) {
  const s = Math.round((Date.now()-ms)/1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.round(s/60)+'m ago';
  return Math.round(s/3600)+'h ago';
}
function skeletonGrid(count=6) {
  return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-top:12px">${
    Array(count).fill(0).map(()=>`<div style="background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:14px">
      <div class="skeleton" style="width:70%;margin-bottom:8px"></div>
      <div class="skeleton" style="width:90%;height:11px"></div>
      <div class="skeleton" style="width:60%;height:11px"></div>
    </div>`).join('')
  }</div>`;
}

      <div class="kit-item" style="grid-column:1/-1">
        <div class="kit-label">Core Values (${cvSelected.length} selected)</div>
        <div class="kit-value">${cvSelected.length?cvSelected.map(v=>`<span class="value-badge">${esc(v.name)}</span>`).join(''):'—'}</div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Personality</div>
    <div class="kit-grid">
      <div class="kit-item"><div class="kit-label">Archetypes</div><div class="kit-value">${bk.archetypes.join(', ')||'—'}</div></div>
      <div class="kit-item"><div class="kit-label">Voice Traits</div><div class="kit-value">${vtSelected.map(t=>t.name).join(', ')||'—'}</div></div>
      ${voiceGuideRows?`<div class="kit-item" style="grid-column:1/-1"><div class="kit-label">Voice Guidance (from Brand Voice Trait Database™)</div><div class="kit-value">${voiceGuideRows}</div></div>`:''}
    </div>
  </div>
  <div class="card">
    <div class="card-title">Positioning</div>
    <div class="kit-grid">
      <div class="kit-item"><div class="kit-label">Target Audience</div><div class="kit-value">${esc(bk.targetAudience||'—')}</div></div>
      <div class="kit-item"><div class="kit-label">Unique Value</div><div class="kit-value">${esc(bk.uniqueValue||'—')}</div></div>
      <div class="kit-item" style="grid-column:1/-1"><div class="kit-label">Positioning Statement</div><div class="kit-value">${esc(bk.positioning||'—')}</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Messaging</div>
    <div class="kit-grid">
      <div class="kit-item"><div class="kit-label">Tagline</div><div class="kit-value">${esc(bk.tagline||'—')}</div></div>
      <div class="kit-item" style="grid-column:1/-1"><div class="kit-label">Elevator Pitch</div><div class="kit-value">${esc(bk.elevator||'—')}</div></div>
    </div>
  </div>
  <div class="action-row" style="margin-top:8px">
    <button class="btn-export" onclick="exportKit()">↓ Export Brand Kit</button>
    ${!allDone&&nextId?`<button class="btn-next" onclick="goTo('${nextId}')">Continue Building →</button>`:''}
  </div>`;
}

function exportKit() {
  const bk = state.brandKit;
  const cvSelected = (db.coreValues||[]).filter(v=>bk.coreValues.includes(v.id));
  const vtSelected = (db.voiceTraits||[]).filter(t=>bk.voiceTraits.includes(t.id));
  const voiceGuide = vtSelected.map(t=>`  ${t.name}\n  Do's: ${t.dos||''}\n  Don'ts: ${t.donts||''}`).join('\n\n');
  const txt = `FIVEFOOTTWO MARKETING — BRANDSAUCE BRAND KIT\n${'='.repeat(46)}\nGenerated: ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}\n\nBRAND HOUSE\nVision: ${bk.vision}\nMission: ${bk.mission}\nCore Values:\n${cvSelected.map(v=>'  • '+v.name).join('\n')}\n\nPERSONALITY\nArchetypes: ${bk.archetypes.join(', ')}\nVoice Traits: ${vtSelected.map(t=>t.name).join(', ')}\n\nVOICE GUIDE (Brand Voice Trait Database™)\n${voiceGuide}\n\nPOSITIONING\nTarget Audience: ${bk.targetAudience}\nUnique Value Proposition: ${bk.uniqueValue}\nPositioning Statement: ${bk.positioning}\n\nMESSAGING\nTagline: ${bk.tagline}\nElevator Pitch: ${bk.elevator}\n`;
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([txt],{type:'text/plain'})),download:`fivefoottwo-brand-kit-${new Date().toISOString().slice(0,10)}.txt`});
  a.click();
}

// ─── Init ─────────────────────────────────────────────────────────────
loadPersistedState();
render();
fetchNotionData();
</script>
</body>
</html>
